# Non-secret configuration in a ConfigMap, secrets in a Secret. The application reads
# both from the environment (see docs/adr/0004); nothing sensitive is baked into the
# image. In production the Secret is managed by a real secret store (Sealed Secrets,
# External Secrets, cloud secret manager) — the values below are local placeholders.
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: ticketing
data:
  HTTP_ADDR: ":8080"
  REDIS_URL: "redis://redis:6379/0"
  BROKER_URL: "amqp://guest:guest@broker:5672/"
  PAYMENT_GATEWAY_URL: "http://payment-gateway-fake:9090"
  ACCESS_TOKEN_TTL_SECONDS: "900"
  REFRESH_TOKEN_TTL_SECONDS: "1209600"
  RESERVATION_TTL_SECONDS: "120"
  QUEUE_ADMIT_BATCH: "50"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: ticketing
type: Opaque
stringData:
  # The app connects as the least-privilege role; the URL (with its password) is a secret.
  DATABASE_URL: "postgres://ticketing_app:app_local_dev_only@postgres:5432/ticketing?sslmode=disable"
  JWT_SECRET: "local_dev_only_change_me_jwt_signing_secret_0123456789"
  PAYMENT_WEBHOOK_SECRET: "dev_webhook_secret"
