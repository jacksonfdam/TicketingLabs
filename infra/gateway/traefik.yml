# Traefik static configuration.
# The gateway is the only host the frontend knows about. Swapping the active backend
# is a change here (and in the dynamic config), never a change in the frontend.

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

api:
  dashboard: true

log:
  level: INFO

accessLog: {}

# Metrics for the observability stack (Phase 4).
metrics:
  prometheus:
    entryPoint: websecure
