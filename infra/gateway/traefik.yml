# Traefik static configuration.
# The gateway is the only host the frontend knows about. Swapping the active backend
# is a change here (and in the dynamic config), never a change in the frontend.

entryPoints:
  # Plain HTTP is served directly for local development and browser access. A real
  # deployment would redirect this to websecure; that one-line redirect is intentionally
  # left out here so the self-signed local cert does not get in the way of clicking around.
  web:
    address: ":80"
  websecure:
    address: ":443"
  # Dedicated port for Prometheus to scrape; not published to the host.
  metrics:
    address: ":8082"

providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

api:
  dashboard: true

log:
  level: INFO

accessLog: {}

# Prometheus metrics for the observability stack, served on the dedicated metrics
# entrypoint. Per-entrypoint and per-service labels give RED metrics without touching
# the backends, so the dashboards work for all seven identically.
metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
