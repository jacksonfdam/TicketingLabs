# Minimal Tempo: receive traces over OTLP/gRPC, store them locally. Enough to search and
# view traces in Grafana; a real deployment uses object storage and a metrics generator.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/blocks
    wal:
      path: /var/tempo/wal
