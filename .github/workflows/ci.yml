name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-lint:
    name: Contract lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Lint the OpenAPI contract
        run: npx --yes @redocly/cli@latest lint contract/openapi.yaml
      - name: Contract mirror is in sync
        run: diff contract/openapi.yaml shared/contract/openapi.yaml

  kmp:
    name: KMP (sharedUI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/kmp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v3
      - name: Install the compile SDK
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
      - name: Test on the Android host + compile iOS-sim
        run: ./gradlew :sharedUI:testAndroidHostTest :sharedUI:compileKotlinIosSimulatorArm64 --stacktrace

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  react-native:
    name: React Native
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  website:
    name: Website build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
