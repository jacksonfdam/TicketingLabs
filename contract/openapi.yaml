openapi: 3.1.0
info:
  title: Ticketing Labs API
  version: 0.1.0
  description: >
    Single source of truth for the flash-sale ticketing API. Every backend in this
    monorepo implements this contract exactly: same paths, same payloads, same status
    codes, same headers. The frontend consumes this contract and never a specific
    backend. If a backend deviates from this file, the contract tests fail, and the
    backend loses.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://localhost/api
    description: Local API Gateway (TLS terminated at the edge)

tags:
  - name: auth
  - name: events
  - name: queue
  - name: reservations
  - name: orders
  - name: webhooks
  - name: system

paths:
  /auth/login:
    post:
      tags: [auth]
      operationId: login
      summary: Log in, receive a short-lived access token and a refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Authenticated
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationError" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      summary: Rotate the refresh token and mint a new access token
      description: >
        Refresh tokens rotate on use. The presented token is revoked and a new one
        issued. Re-using a revoked refresh token is treated as theft and rejected.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshRequest" }
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Rotated
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /events:
    get:
      tags: [events]
      operationId: listEvents
      summary: List events (cacheable, cursor-paginated)
      security: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: A page of events
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            Cache-Control:
              schema: { type: string }
              description: e.g. "public, max-age=30"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventPage" }

  /events/{id}:
    get:
      tags: [events]
      operationId: getEvent
      summary: Event detail with its sectors (ETag / Cache-Control)
      security: []
      parameters:
        - $ref: "#/components/parameters/PathId"
        - name: If-None-Match
          in: header
          schema: { type: string }
          description: Conditional request. Return 304 if the ETag matches.
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Event with sectors
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EventDetail" }
        "304":
          description: Not modified (ETag matched)
        "404": { $ref: "#/components/responses/NotFound" }

  /events/{id}/queue:
    post:
      tags: [queue]
      operationId: joinQueue
      summary: Join the virtual waiting room for an event
      description: Rate limited. Backed by Redis. Returns your position in line.
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "201":
          description: Joined the queue
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QueueToken" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "429": { $ref: "#/components/responses/RateLimited" }

  /events/{id}/queue/status:
    get:
      tags: [queue]
      operationId: getQueueStatus
      summary: Check your position and whether you have been admitted
      description: Lightweight polling endpoint. Poll gently.
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Current queue status
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QueueToken" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /reservations:
    post:
      tags: [reservations]
      operationId: createReservation
      summary: Hold stock for a sector (idempotent, distributed-locked)
      description: >
        The main event. Requires an admitted queue token. Decrements
        available_inventory atomically under a distributed lock. The Idempotency-Key
        header is mandatory here: re-sending the same key returns the original
        reservation instead of creating a second hold.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateReservation" }
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "201":
          description: Stock held
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Reservation" }
        "200":
          description: Idempotent replay. The original reservation for this key.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Reservation" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403":
          description: No admitted queue token for this event
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "409":
          description: Not enough inventory
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /reservations/{id}:
    delete:
      tags: [reservations]
      operationId: releaseReservation
      summary: Release a held reservation (idempotent)
      description: >
        Returns the stock to the sector. Idempotent: deleting an already-released
        reservation still returns 204. Deleting nothing costs nothing.
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "204":
          description: Released (or already released)
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /orders:
    post:
      tags: [orders]
      operationId: createOrder
      summary: Create an order and enqueue payment (async, 202)
      description: >
        Converts a held reservation into an order and enqueues the payment job.
        Returns 202 Accepted immediately. The client then polls GET /orders/{id}.
        Idempotent by key.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyRequired"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOrder" }
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "202":
          description: Accepted. Payment is being processed asynchronously.
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Reservation is not in a state that can be ordered
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /orders/{id}:
    get:
      tags: [orders]
      operationId: getOrder
      summary: Poll order status
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Order status
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /webhooks/payment:
    post:
      tags: [webhooks]
      operationId: paymentWebhook
      summary: Payment provider callback (signature verified)
      description: >
        Called by the fake payment gateway. The X-Signature header is an HMAC of the
        raw body. An invalid or missing signature is rejected with 401. This endpoint
        is idempotent by provider_ref.
      security: []
      parameters:
        - name: X-Signature
          in: header
          required: true
          schema: { type: string }
          description: HMAC-SHA256 of the raw request body, hex-encoded.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PaymentWebhook" }
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Accepted and processed
          headers:
            X-Request-Id: { $ref: "#/components/headers/XRequestId" }
        "401":
          description: Bad or missing signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  /health:
    get:
      tags: [system]
      operationId: health
      summary: Liveness probe
      security: []
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Process is alive
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /ready:
    get:
      tags: [system]
      operationId: ready
      summary: Readiness probe (checks DB, Redis, broker)
      security: []
      responses:
        "400": { $ref: "#/components/responses/BadRequest" }
        "200":
          description: Ready to serve traffic
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }
        "503":
          description: A dependency is unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  headers:
    XRequestId:
      schema: { type: string }
      description: Correlation id for tracing, present on every response.

  parameters:
    PathId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Opaque cursor from a previous page's next_cursor.
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, maxLength: 255 }
    IdempotencyKeyRequired:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, maxLength: 255 }
      description: Mandatory on this endpoint. Same key returns the same resource.

  responses:
    BadRequest:
      description: >
        The request was malformed (bad syntax, invalid headers, or an unparseable
        parameter such as a corrupt pagination cursor). Any endpoint may return this.
        Application-level rejections use the JSON error envelope; requests so
        malformed that the HTTP layer rejects them before the application runs (for
        example control characters in a header) may return a plain-text body instead.
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        text/plain:
          schema: { type: string }
    Unauthorized:
      description: Missing or invalid credentials
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    NotFound:
      description: Resource not found
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    ValidationError:
      description: Input failed validation
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    RateLimited:
      description: Too many requests
      headers:
        X-Request-Id: { $ref: "#/components/headers/XRequestId" }
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code: { type: string, example: inventory_exhausted }
            message: { type: string, example: Not enough inventory available }
            request_id: { type: string }
      additionalProperties: false

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
      additionalProperties: false

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token: { type: string }
      additionalProperties: false

    TokenPair:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token: { type: string }
        refresh_token: { type: string }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: Access token lifetime in seconds }
      additionalProperties: false

    Event:
      type: object
      required: [id, name, venue, starts_at, sales_open_at, status]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        venue: { type: string }
        starts_at: { type: string, format: date-time }
        sales_open_at: { type: string, format: date-time }
        status: { type: string, enum: [draft, on_sale, sold_out, closed] }
      additionalProperties: false

    Sector:
      type: object
      required: [id, event_id, name, price_cents, currency, total_inventory, available_inventory]
      properties:
        id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        name: { type: string }
        price_cents: { type: integer, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        total_inventory: { type: integer, minimum: 0 }
        available_inventory: { type: integer, minimum: 0 }
      additionalProperties: false

    EventDetail:
      allOf:
        - $ref: "#/components/schemas/Event"
        - type: object
          required: [sectors]
          properties:
            sectors:
              type: array
              items: { $ref: "#/components/schemas/Sector" }

    EventPage:
      type: object
      required: [data, next_cursor]
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/Event" }
        next_cursor:
          type: [string, "null"]
          description: Pass to ?cursor= for the next page. Null when there are no more.
      additionalProperties: false

    QueueToken:
      type: object
      required: [id, user_id, event_id, position, status]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        event_id: { type: string, format: uuid }
        position: { type: integer, minimum: 0 }
        status: { type: string, enum: [waiting, admitted, expired] }
        admitted_at: { type: [string, "null"], format: date-time }
      additionalProperties: false

    CreateReservation:
      type: object
      required: [sector_id, quantity]
      properties:
        sector_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1, maximum: 8 }
      additionalProperties: false

    Reservation:
      type: object
      required: [id, user_id, sector_id, quantity, status, expires_at]
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        sector_id: { type: string, format: uuid }
        quantity: { type: integer, minimum: 1 }
        status: { type: string, enum: [held, confirmed, released, expired] }
        expires_at: { type: string, format: date-time }
      additionalProperties: false

    CreateOrder:
      type: object
      required: [reservation_id]
      properties:
        reservation_id: { type: string, format: uuid }
      additionalProperties: false

    Order:
      type: object
      required: [id, reservation_id, user_id, amount_cents, status, created_at]
      properties:
        id: { type: string, format: uuid }
        reservation_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        amount_cents: { type: integer, minimum: 0 }
        status: { type: string, enum: [pending, paid, failed, refunded] }
        created_at: { type: string, format: date-time }
      additionalProperties: false

    PaymentWebhook:
      type: object
      required: [provider_ref, order_id, status]
      properties:
        provider_ref: { type: string }
        order_id: { type: string, format: uuid }
        status: { type: string, enum: [succeeded, failed] }
      additionalProperties: false

    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [ok, degraded, down] }
        checks:
          type: object
          additionalProperties: { type: string, enum: [ok, down] }
      additionalProperties: false

security:
  - bearerAuth: []
