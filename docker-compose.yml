# Base compose for the ticketing lab.
#
# Phase 0 brings up the shared infrastructure every backend depends on: Postgres,
# Redis, the RabbitMQ broker, the fake payment gateway, and the Traefik API gateway.
# The backend service itself lands in Phase 1; until then /api has nothing healthy to
# route to, which is expected.
#
# Profiles let one file serve several situations:
#   docker compose up -d                       # core infra
#   docker compose --profile demo up -d        # + anything demo-only
#   docker compose --profile load up -d        # + load-testing tooling
#
# Everything reads from .env (copy .env.example first).

name: ticketing-labs

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_local_dev_only}
    ports:
      - "5432:5432"
    volumes:
      # Postgres 18+ images store data under /var/lib/postgresql (major-version
      # subdirectories), not /var/lib/postgresql/data. Mount the parent accordingly.
      - pgdata:/var/lib/postgresql
      # Applied in order on first init: schema, then role, then seed.
      - ./contract/db/migrations/0001_init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./contract/db/migrations/0002_app_role.sql:/docker-entrypoint-initdb.d/02_role.sql:ro
      - ./contract/db/seed.sql:/docker-entrypoint-initdb.d/03_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ticketing}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  broker:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest_local_dev_only}
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-gateway-fake:
    build: ./services/payment-gateway-fake
    environment:
      PORT: "9090"
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret}
      # Posts straight to the active backend in-network. The HMAC signature is what
      # authenticates the callback, not the network path.
      WEBHOOK_TARGET_URL: http://backend:8080/webhooks/payment
    ports:
      - "9090:9090"

  # The backends. Each answers to the network alias "backend", which is the host the
  # gateway routes to, and each sits behind a compose profile. Exactly one runs at a
  # time, chosen by COMPOSE_PROFILES in .env. Switching the active backend is that one
  # line; the frontend, the gateway config, and the contract never change. That is the
  # entire premise of this lab, expressed in docker-compose.
  backend-go:
    profiles: [go]
    build: ./backends/go
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${APP_DB_USER:-ticketing_app}:${APP_DB_PASSWORD:-app_local_dev_only}@postgres:5432/${POSTGRES_DB:-ticketing}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest_local_dev_only}@broker:5672/
      JWT_SECRET: ${JWT_SECRET:-local_dev_only_change_me_jwt_signing_secret_0123456789}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-1209600}
      PAYMENT_GATEWAY_URL: http://payment-gateway-fake:9090
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret}
      RESERVATION_TTL_SECONDS: ${RESERVATION_TTL_SECONDS:-120}
      QUEUE_ADMIT_BATCH: ${QUEUE_ADMIT_BATCH:-50}
    networks:
      default:
        aliases: [backend]

  backend-fastapi:
    profiles: [fastapi]
    build: ./backends/fastapi
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      # asyncpg does not want the libpq sslmode query param, so it is omitted here.
      DATABASE_URL: postgres://${APP_DB_USER:-ticketing_app}:${APP_DB_PASSWORD:-app_local_dev_only}@postgres:5432/${POSTGRES_DB:-ticketing}
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest_local_dev_only}@broker:5672/
      JWT_SECRET: ${JWT_SECRET:-local_dev_only_change_me_jwt_signing_secret_0123456789}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-1209600}
      PAYMENT_GATEWAY_URL: http://payment-gateway-fake:9090
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret}
      RESERVATION_TTL_SECONDS: ${RESERVATION_TTL_SECONDS:-120}
      QUEUE_ADMIT_BATCH: ${QUEUE_ADMIT_BATCH:-50}
    networks:
      default:
        aliases: [backend]

  backend-nest:
    profiles: [nest]
    build: ./backends/nest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${APP_DB_USER:-ticketing_app}:${APP_DB_PASSWORD:-app_local_dev_only}@postgres:5432/${POSTGRES_DB:-ticketing}
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest_local_dev_only}@broker:5672/
      JWT_SECRET: ${JWT_SECRET:-local_dev_only_change_me_jwt_signing_secret_0123456789}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-1209600}
      PAYMENT_GATEWAY_URL: http://payment-gateway-fake:9090
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret}
      RESERVATION_TTL_SECONDS: ${RESERVATION_TTL_SECONDS:-120}
      QUEUE_ADMIT_BATCH: ${QUEUE_ADMIT_BATCH:-50}
    networks:
      default:
        aliases: [backend]

  backend-express:
    profiles: [express]
    build: ./backends/express
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${APP_DB_USER:-ticketing_app}:${APP_DB_PASSWORD:-app_local_dev_only}@postgres:5432/${POSTGRES_DB:-ticketing}
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest_local_dev_only}@broker:5672/
      JWT_SECRET: ${JWT_SECRET:-local_dev_only_change_me_jwt_signing_secret_0123456789}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-1209600}
      PAYMENT_GATEWAY_URL: http://payment-gateway-fake:9090
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret}
      RESERVATION_TTL_SECONDS: ${RESERVATION_TTL_SECONDS:-120}
      QUEUE_ADMIT_BATCH: ${QUEUE_ADMIT_BATCH:-50}
    networks:
      default:
        aliases: [backend]

  # Laravel runs as two processes: FrankenPHP serving HTTP (takes the "backend" alias)
  # and a queue worker consuming payment.requested. Both build the same image.
  backend-laravel:
    profiles: [laravel]
    build: ./backends/laravel
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      broker:
        condition: service_healthy
    environment: &laravel-env
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: base64:W3H5fq8J5rQ6ck/1fLMgCrdmebW9QmCuRWcOttevhL0=
      LOG_CHANNEL: stderr
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: ${POSTGRES_DB:-ticketing}
      DB_USERNAME: ${APP_DB_USER:-ticketing_app}
      DB_PASSWORD: ${APP_DB_PASSWORD:-app_local_dev_only}
      SESSION_DRIVER: array
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      REDIS_URL: redis://redis:6379/0
      BROKER_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest_local_dev_only}@broker:5672/
      JWT_SECRET: ${JWT_SECRET:-local_dev_only_change_me_jwt_signing_secret_0123456789}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      REFRESH_TOKEN_TTL_SECONDS: ${REFRESH_TOKEN_TTL_SECONDS:-1209600}
      PAYMENT_GATEWAY_URL: http://payment-gateway-fake:9090
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-dev_webhook_secret}
      RESERVATION_TTL_SECONDS: ${RESERVATION_TTL_SECONDS:-120}
      QUEUE_ADMIT_BATCH: ${QUEUE_ADMIT_BATCH:-50}
    networks:
      default:
        aliases: [backend]

  backend-laravel-worker:
    profiles: [laravel]
    build: ./backends/laravel
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    entrypoint: ["php"]
    command: ["artisan", "payments:work"]
    environment:
      <<: *laravel-env

  gateway:
    image: traefik:v3.7
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik.yml
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080" # Traefik dashboard
    volumes:
      - ./infra/gateway/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./infra/gateway/dynamic.yml:/etc/traefik/dynamic.yml:ro

volumes:
  pgdata:
  redisdata:
