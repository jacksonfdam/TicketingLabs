server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers. The SPA and its API share the gateway origin, so a tight CSP
    # works: scripts/styles from self only (style-src allows inline for the small amount
    # Vite injects), connections to self (the /api routes on the same origin).
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; base-uri 'self'; frame-ancestors 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed assets are immutable: cache them for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown paths render the app shell (client-side routing).
    location / {
        try_files $uri /index.html;
    }
}
